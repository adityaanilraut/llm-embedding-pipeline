version: "3.9"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow.Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: "rag-pipeline-secret"
    RAG_DATA_DIR: /opt/airflow/project/data
    RAG_INDEX_DIR: /opt/airflow/project/indices
    RAG_STATE_DB: /opt/airflow/project/data/state.db
    RAG_QDRANT_URL: http://qdrant:6333
    RAG_BACKENDS: faiss,qdrant
    PYTHONPATH: /opt/airflow/project/src
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./data:/opt/airflow/project/data
    - ./indices:/opt/airflow/project/indices
  depends_on:
    airflow-db:
      condition: service_healthy
    qdrant:
      condition: service_started

services:

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  airflow-db:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - airflow_pg:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin
                   --firstname admin --lastname admin --role Admin --email admin@example.com || true"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn rag_pipeline.api.main:app --host 0.0.0.0 --port 8000
    environment:
      RAG_QDRANT_URL: http://qdrant:6333
      RAG_DATA_DIR: /app/data
      RAG_INDEX_DIR: /app/indices
      RAG_STATE_DB: /app/data/state.db
      PYTHONPATH: /app/src
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./indices:/app/indices
    depends_on:
      - qdrant
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run src/rag_pipeline/api/ui.py --server.address=0.0.0.0 --server.port=8501
    environment:
      RAG_API_URL: http://api:8000
      PYTHONPATH: /app/src
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  qdrant_storage:
  airflow_pg:
